# UFO Galaxy Android Runtime Configuration
# ============================================================
# This file is the PACKAGED ASSET DEFAULTS layer of the configuration hierarchy:
#
#   1. Build-time defaults   (BuildConfig fields in app/build.gradle)
#   2. Packaged asset defaults  <-- THIS FILE
#   3. Persisted runtime overrides  (SharedPreferences via AppSettings)
#   4. Effective runtime settings authority  (AppSettings interface)
#
# Values here override compile-time BuildConfig constants and are themselves
# overridden by any value the user has stored in SharedPreferences.
#
# Both the LOCAL CHAIN (planner / grounding / local loop) and the
# CROSS-DEVICE CHAIN (gateway WebSocket, REST registration) read their
# effective settings from AppSettings, which seeds its defaults from
# this file on first construction.
#
# NOTE: ws:// and http:// are intentional for Tailscale (private VPN) networks.
# Replace with wss:// and https:// when deploying over public / untrusted networks.

# ── Cross-device chain settings ──────────────────────────────────────────────

# Master toggle: false = local-only mode; true = connect to gateway.
cross_device_enabled=false

# WebSocket endpoint for Galaxy gateway (AIP v3 cross-device channel).
# Replace 100.x.x.x with the actual Tailscale IP of the gateway host.
galaxy_gateway_url=ws://100.x.x.x:8765

# REST base URL for device registration and API calls.
# Replace 100.x.x.x with the actual Tailscale IP of the gateway host.
rest_base_url=http://100.x.x.x:8765

# ── Local-chain execution settings (planner / grounding) ─────────────────────

# Maximum tokens the MobileVLM planner may generate per call.
planner_max_tokens=512

# Sampling temperature for MobileVLM (lower = more deterministic).
planner_temperature=0.1

# HTTP connect+read timeout for MobileVLM inference calls (milliseconds).
planner_timeout_ms=30000

# HTTP connect+read timeout for SeeClick grounding calls (milliseconds).
grounding_timeout_ms=15000

# Longest edge (pixels) to which screenshots are downscaled before grounding.
# Set to 0 to disable downscaling and pass full-resolution images.
scaled_max_edge=720
