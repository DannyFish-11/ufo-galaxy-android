## UFO³ Galaxy Android Agent 配置
#
# NOTE: These values are LOCAL FALLBACK ONLY.
# At startup the app fetches live configuration from GET /api/v1/config on the
# gateway and overrides all values below in memory. These settings are used
# only when the gateway is unreachable or the remote config endpoint returns
# an error.

# Galaxy Gateway WebSocket 地址
# 请修改为您的 Windows PC 的 Tailscale IP 地址
# 格式：ws://<host>:<port>  或  wss://<host>:<port>（仅主机+端口，不含路径）
# WebSocket 路径由客户端自动选择，按优先级回退：
#   1. /ws/device/{id}
#   2. /ws/android
#   3. /ws/ufo3/{id}
galaxy.gateway.url=ws://100.x.x.x:8000

# Agent ID (如果为空，将自动生成)
agent.id=

# Agent 名称
agent.name=Android Agent

# Agent 能力标签 (逗号分隔)
agent.capabilities=mobile,ui_automation,voice_input,text_input

# 心跳间隔 (毫秒)
heartbeat.interval=30000

# 自动重连
auto.reconnect=true

# REST API 基础地址（HTTP）
# 设备注册/心跳/发现接口优先使用 /api/v1/devices/*，
# 如果服务器返回 404 则自动回退到旧版 /api/devices/*
rest.base.url=http://100.x.x.x:8000
