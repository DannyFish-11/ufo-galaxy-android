name: Android CI

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*", "release-*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      protected_release:
        description: "Run protected release enforcement gate (blocks on unresolved critical continuity/replay/schema/evidence/closure gaps)"
        required: false
        default: "false"

permissions:
  contents: read

# ─────────────────────────────────────────────────────────────────────────────
# Job dependencies (all jobs are blocking — failure prevents merge):
# - build is required by protocol-contract-guard, runtime-regression,
#   cross-repo-compatibility-guard, e2e-verification-gate, and lint.
# - all-unit-tests requires protocol-contract-guard + runtime-regression +
#   cross-repo-compatibility-guard + e2e-verification-gate.
# - ci-gate requires all-unit-tests + lint + cross-repo-compatibility-guard.
#
# protocol-contract-guard: AIP v3 device_register / capability_report /
#   task_result / reconnect protocol contracts.  Failure = protocol regression.
#
# runtime-regression: Local intelligence runtime startup/shutdown/state-
#   transitions/failure/recovery/capability-honesty.  Failure = runtime regression.
#
# all-unit-tests: Full test suite; must pass after the dedicated gate jobs.
#
# e2e-verification-gate: Dual-repo E2E verification harness unit tests (PR-72).
#   Runs DualRepoE2EVerificationHarness / Stage / Artifact / Report tests.
#   NOTE: In CI (no real device attached) the harness produces an honest
#   "e2e_blocked_no_device" artifact and exports it as a structured artifact
#   for V2 consumption.  The gate never falsely claims real-device E2E
#   verification when no device is present.  Failure = harness regression.
#
# lint: Code-quality gate; must pass before merge.
#
# ci-gate: Final aggregation job; PR merge is blocked until this job is green.
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── Build (blocking gate #1) ───────────────────────────────────────────────
  build:
    name: "Build [gate 1/5]"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile sources
        run: ./gradlew :app:compileDebugKotlin

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

  # ── Protocol Contract Guard (blocking gate #2) ────────────────────────────
  #
  # Runs only the protocol and E2E-contract test packages.  These tests guard
  # the AIP v3 wire contracts that V2 enforces on every Android connection:
  #   - device_register envelope (version, protocol, device_id)
  #   - capability_report payload (8 required metadata keys, validate())
  #   - task_result payload (correlation echo, terminal status vocabulary)
  #   - reconnect / re-register wire values (ReconnectRecoveryState)
  #
  # Failure here means a protocol regression that would break V2 ↔ Android
  # interoperability.  The PR must not merge until this job is green.
  protocol-contract-guard:
    name: "Protocol Contract Guard [gate 2/5]"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run protocol contract tests
        run: |
          ./gradlew :app:testDebugUnitTest \
            --tests "com.ufo.galaxy.protocol.*" \
            --tests "com.ufo.galaxy.e2e.*"

      - name: Upload protocol test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: protocol-contract-guard-results
          path: app/build/reports/tests/

  # ── Runtime Regression (blocking gate #3) ────────────────────────────────
  #
  # Runs the runtime, local-loop, and capability test packages.  These tests
  # guard Android's local-intelligence runtime behaviour as a participant:
  #   - LocalInferenceRuntimeManager lifecycle (startup/shutdown/state transitions)
  #   - Failure and recovery paths (restart, safe-mode, clear-safe-mode)
  #   - Capability honesty (ACTIVE/DEGRADED/DISABLED aligned with runtime state)
  #   - Reconnect resilience and degraded-fallback behaviour
  #
  # Failure here means a runtime regression that would cause V2 to receive
  # dishonest capability reports or to dispatch tasks onto an unavailable
  # participant.  The PR must not merge until this job is green.
  runtime-regression:
    name: "Runtime Regression [gate 3/5]"
    runs-on: ubuntu-latest
    # 真机复现过:这个 job 曾无限期挂起(观测到 4h16m+ 仍 in_progress,而其余 6 个
    # 门都在 3~4 分钟内跑完),此前全文件没有任何 job 设 timeout-minutes,只能靠
    # GitHub 默认 6 小时兜底,期间一直占着 runner、挡住 PR 合并。20 分钟 =
    # 正常耗时(观测 ~3~4 分钟)的 5 倍富余,既不会误伤正常运行,又能把未来的
    # 挂起代价从"几小时"压到"20 分钟自动失败"。
    timeout-minutes: 20
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run runtime and local-loop regression tests
        run: |
          ./gradlew :app:testDebugUnitTest \
            --tests "com.ufo.galaxy.runtime.*" \
            --tests "com.ufo.galaxy.local.*" \
            --tests "com.ufo.galaxy.capability.*"

      - name: Upload runtime regression results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-regression-results
          path: app/build/reports/tests/

  # ── Cross-repo Compatibility Guard (blocking gate #4) ────────────────────
  #
  # Runs focused Android↔V2 contract tests that pin required shared boundary
  # surfaces for schema versions, replay/dedupe classes, recovery routing, and
  # non-closure signal classification. Failures are expected to be actionable.
  cross-repo-compatibility-guard:
    name: "Cross-Repo Compatibility Guard [parallel gate 4/7]"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run cross-repo compatibility contract tests
        run: |
          # Gate coverage:
          # - Pr14AndroidV2ContractVersionGateTest: schema/version + required type-set anchors
          # - Pr119AndroidCrossRepoRecoveryStateRoutingContractTest: recovery routing semantics
          # - Pr120AndroidNonClosureSignalBoundaryContractTest: non-closure negative-proof boundary
          # - AndroidCrossRepoDedupeContractTest: replay/dedupe required-field/type semantics
          ./gradlew :app:testDebugUnitTest \
            --tests "com.ufo.galaxy.runtime.Pr14AndroidV2ContractVersionGateTest" \
            --tests "com.ufo.galaxy.runtime.Pr119AndroidCrossRepoRecoveryStateRoutingContractTest" \
            --tests "com.ufo.galaxy.runtime.Pr120AndroidNonClosureSignalBoundaryContractTest" \
            --tests "com.ufo.galaxy.runtime.AndroidCrossRepoDedupeContractTest"

      - name: Upload cross-repo compatibility results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-repo-compatibility-results
          path: app/build/reports/tests/

  # ── E2E Verification Gate (blocking gate #5) ─────────────────────────────
  #
  # Runs the dual-repo E2E verification harness unit tests (PR-72).  These
  # tests guard the full 7-stage participant lifecycle chain:
  #   - DualRepoE2EVerificationStage wire values and required-stage set
  #   - DualRepoE2EVerificationHarness artifact derivation rules
  #   - DualRepoE2EVerificationReport toWireMap / isRealDeviceE2EVerified
  #   - AndroidCrossRepoRegressionRuntimeHooks coverage for capability/execution/
  #     recovery/takeover/mesh runtime-hook closure in dual-runtime regression
  #   - Honest no-device output: harness must produce e2e_blocked_no_device
  #     in CI, never falsely claim real-device verification
  #   - Bridge wiring: CAPABILITY_REPORT and TASK_RESULT_RETURN are new
  #     stages not forwarded to the existing bridge
  #
  # After tests pass, this job generates an honest CI-level verification
  # status artifact (e2e_blocked_no_device) for V2 consumption.  This
  # artifact is intentionally not a verified artifact — it correctly reflects
  # the absence of a real device in CI.
  #
  # Failure here means an E2E harness regression.  The PR must not merge
  # until this job is green.
  e2e-verification-gate:
    name: "E2E Verification Gate [gate 5/7]"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run E2E verification harness unit tests
        run: |
          ./gradlew :app:testDebugUnitTest \
            --tests "com.ufo.galaxy.runtime.Pr72DualRepoE2EVerificationHarnessTest" \
            --tests "com.ufo.galaxy.runtime.Pr11BAndroidCrossRepoRegressionRuntimeHooksTest"

      - name: Generate CI-level E2E verification status artifact (tests passed)
        if: success()
        run: |
          mkdir -p app/build/e2e-verification
          cat > app/build/e2e-verification/ci-e2e-status.json << 'EOFSTATUS'
          {
            "schema_version": "1.0",
            "source": "android-ci",
            "verification_kind": "no_device",
            "artifact_tag": "e2e_blocked_no_device",
            "is_real_device_e2e_verified": false,
            "is_v2_consumable": false,
            "blocked_reason": "No physical Android device was present in CI; E2E verification cannot proceed without a device",
            "harness_tests_passed": true,
            "note": "This artifact honestly reflects the CI environment. Real-device E2E verification requires a physical Android device. The harness unit tests validated all artifact derivation rules and stage classifications."
          }
          EOFSTATUS
          echo "CI E2E verification status artifact generated (e2e_blocked_no_device — honest CI output)."

      - name: Generate CI-level E2E verification status artifact (tests failed)
        if: failure()
        run: |
          mkdir -p app/build/e2e-verification
          cat > app/build/e2e-verification/ci-e2e-status.json << 'EOFSTATUS'
          {
            "schema_version": "1.0",
            "source": "android-ci",
            "verification_kind": "no_device",
            "artifact_tag": "e2e_blocked_no_device",
            "is_real_device_e2e_verified": false,
            "is_v2_consumable": false,
            "blocked_reason": "No physical Android device was present in CI; E2E verification cannot proceed without a device",
            "harness_tests_passed": false,
            "note": "Harness unit tests FAILED. The E2E verification harness has a regression. Review the test results artifact for details."
          }
          EOFSTATUS
          echo "CI E2E verification status artifact generated (harness_tests_passed=false — tests failed)."

      - name: Upload E2E harness test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-verification-gate-results
          path: |
            app/build/reports/tests/
            app/build/e2e-verification/

  # ── All Unit Tests (blocking gate #6) ────────────────────────────────────
  #
  # Runs the full JVM unit test suite after the three targeted gate jobs pass.
  # Any test regression anywhere in the codebase is caught here.
  all-unit-tests:
    name: "All Unit Tests [gate 6/7]"
    runs-on: ubuntu-latest
    # 全量 12000+ 测试实测 ~16.5 分钟,20 分钟余量太薄(一次真实超时被杀,浪费整轮
    # CI 排查)。30 分钟仍能拦住真挂起,同时给套件自然增长留出余量。
    timeout-minutes: 30
    needs: [protocol-contract-guard, runtime-regression, cross-repo-compatibility-guard, e2e-verification-gate]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run all JVM unit tests
        run: ./gradlew :app:test

      - name: Upload full test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-unit-test-results
          path: app/build/reports/tests/

  # ── Lint (blocking gate #7) ──────────────────────────────────────────────
  lint:
    name: "Lint [gate 7/7]"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run lint
        run: ./gradlew lintDebug

      - name: Print full lint report on failure
        if: failure()
        run: |
          for f in app/build/intermediates/lint_intermediate_text_report/debug/lint-results-debug.txt \
                   app/build/reports/lint-results-debug.txt; do
            if [ -f "$f" ]; then
              echo "===== $f ====="
              cat "$f"
              break
            fi
          done

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results-debug.html

  # ── Cross-Repo Evidence Status Artifact (always-on visibility) ─────────────
  #
  # Always emits a machine-readable artifact describing protected verification
  # execution state and key behavior evidence visibility. This prevents silent
  # green states when critical evidence paths were not run.
  cross-repo-evidence-status:
    name: "Cross-Repo Evidence Status [visibility]"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - build
      - protocol-contract-guard
      - runtime-regression
      - cross-repo-compatibility-guard
      - e2e-verification-gate
      - all-unit-tests
      - lint
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate cross-repo evidence status artifact
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          PROTOCOL_RESULT: ${{ needs.protocol-contract-guard.result }}
          RUNTIME_RESULT: ${{ needs.runtime-regression.result }}
          COMPAT_RESULT: ${{ needs.cross-repo-compatibility-guard.result }}
          E2E_RESULT: ${{ needs.e2e-verification-gate.result }}
          UNIT_RESULT: ${{ needs.all-unit-tests.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_VALUE: ${{ github.ref }}
          FORCE_PROTECTED_RELEASE: ${{ github.event.inputs.protected_release }}
        run: |
          mkdir -p app/build/e2e-verification
          python3 - <<'PY'
          import json
          import os

          build = os.getenv("BUILD_RESULT", "unknown")
          protocol = os.getenv("PROTOCOL_RESULT", "unknown")
          runtime = os.getenv("RUNTIME_RESULT", "unknown")
          compat = os.getenv("COMPAT_RESULT", "unknown")
          e2e = os.getenv("E2E_RESULT", "unknown")
          unit = os.getenv("UNIT_RESULT", "unknown")
          lint = os.getenv("LINT_RESULT", "unknown")
          event_name = os.getenv("EVENT_NAME", "")
          github_ref = os.getenv("GITHUB_REF_VALUE", "")
          force_protected_release = os.getenv("FORCE_PROTECTED_RELEASE", "false").lower() == "true"

          protected_execution_state = "evidenced"
          if build != "success":
              protected_execution_state = "not_run"
          elif any(v != "success" for v in [protocol, runtime, compat, e2e, unit, lint]):
              if any(v == "skipped" for v in [e2e, compat, unit, lint]):
                  protected_execution_state = "partially_run"
              else:
                  protected_execution_state = "failed"

          replay_ordering_state = "not_run"
          reconnect_continuity_state = "not_run"
          recovery_behavior_state = "not_run"
          closure_completeness_state = "not_run"
          real_device_e2e_state = "not_run"
          evidence_visibility_reason = "e2e_gate_not_run"

          if e2e == "success":
              replay_ordering_state = "partially_run"
              reconnect_continuity_state = "not_run"
              recovery_behavior_state = "not_run"
              closure_completeness_state = "partially_run"
              real_device_e2e_state = "not_run"
              evidence_visibility_reason = "ci_no_physical_device_harness_contracts_verified"
          elif e2e in {"failure", "cancelled"}:
              replay_ordering_state = "failed"
              reconnect_continuity_state = "failed"
              recovery_behavior_state = "failed"
              closure_completeness_state = "failed"
              real_device_e2e_state = "failed"
              evidence_visibility_reason = "e2e_harness_gate_failed"
          elif e2e == "skipped":
              evidence_visibility_reason = "e2e_harness_gate_skipped"

          is_release_tag = github_ref.startswith("refs/tags/v") or github_ref.startswith("refs/tags/release-")
          is_release_branch = github_ref.startswith("refs/heads/release/")
          is_dispatch_protected = event_name == "workflow_dispatch" and force_protected_release
          is_protected_release_path = bool(is_release_tag or is_release_branch or is_dispatch_protected)

          release_path_class = "protected_release" if is_protected_release_path else "development_or_pr"

          conditions = [
              {
                  "condition_id": "schema_contract_compatibility",
                  "condition_class": "schema_drift",
                  "severity": "high",
                  "invariant": "android_v2_contract_compatibility_guard",
                  "source_gate": "cross_repo_compatibility_guard",
                  "status": "unresolved" if compat != "success" else "satisfied",
                  "failure_reason": "cross_repo_compatibility_guard_not_success" if compat != "success" else "none",
                  "actual_value": compat,
                  "expected_value": "success",
                  "action_hint": "Run Android↔V2 compatibility tests and align schema/version/message-contract surfaces before protected release."
              },
              {
                  "condition_id": "replay_evidence",
                  "condition_class": "replay_risk",
                  "severity": "high",
                  "invariant": "replay_ordering_evidence_state",
                  "source_gate": "e2e_verification_gate",
                  "status": "unresolved" if replay_ordering_state in {"not_run", "failed"} else "satisfied",
                  "failure_reason": "none" if replay_ordering_state not in {"not_run", "failed"} else f"replay_ordering_{replay_ordering_state}",
                  "actual_value": replay_ordering_state,
                  "expected_value": "partially_run_or_evidenced",
                  "action_hint": "Ensure replay-ordering evidence is at least partially_run and not failed for protected release."
              },
              {
                  "condition_id": "continuity_evidence",
                  "condition_class": "continuity_risk",
                  "severity": "high",
                  "invariant": "reconnect_continuity_evidence_state",
                  "source_gate": "e2e_verification_gate",
                  "status": "unresolved" if reconnect_continuity_state in {"not_run", "failed"} else "satisfied",
                  "failure_reason": "none" if reconnect_continuity_state not in {"not_run", "failed"} else f"reconnect_continuity_{reconnect_continuity_state}",
                  "actual_value": reconnect_continuity_state,
                  "expected_value": "partially_run_or_evidenced",
                  "action_hint": "Provide reconnect continuity verification evidence for protected release."
              },
              {
                  "condition_id": "recovery_evidence",
                  "condition_class": "recovery_risk",
                  "severity": "high",
                  "invariant": "recovery_behavior_evidence_state",
                  "source_gate": "e2e_verification_gate",
                  "status": "unresolved" if recovery_behavior_state in {"not_run", "failed"} else "satisfied",
                  "failure_reason": "none" if recovery_behavior_state not in {"not_run", "failed"} else f"recovery_behavior_{recovery_behavior_state}",
                  "actual_value": recovery_behavior_state,
                  "expected_value": "partially_run_or_evidenced",
                  "action_hint": "Provide recovery-behavior evidence instead of relying on advisory-only status."
              },
              {
                  "condition_id": "closure_quality_evidence",
                  "condition_class": "closure_quality_gap",
                  "severity": "high",
                  "invariant": "closure_completeness_evidence_state",
                  "source_gate": "e2e_verification_gate",
                  "status": "unresolved" if closure_completeness_state in {"not_run", "failed"} else "satisfied",
                  "failure_reason": "none" if closure_completeness_state not in {"not_run", "failed"} else f"closure_completeness_{closure_completeness_state}",
                  "actual_value": closure_completeness_state,
                  "expected_value": "partially_run_or_evidenced",
                  "action_hint": "Ensure closure completeness evidence is available for protected release movement."
              },
              {
                  "condition_id": "real_device_e2e_evidence",
                  "condition_class": "evidence_absence",
                  "severity": "high",
                  "invariant": "real_device_e2e_state",
                  "source_gate": "e2e_verification_gate",
                  "status": "unresolved" if real_device_e2e_state != "evidenced" else "satisfied",
                  "failure_reason": "none" if real_device_e2e_state == "evidenced" else f"real_device_e2e_{real_device_e2e_state}",
                  "actual_value": real_device_e2e_state,
                  "expected_value": "evidenced",
                  "action_hint": "Protected release requires real-device E2E evidence; no-device CI artifact is visibility-only."
              }
          ]

          blocking_conditions = [c for c in conditions if c["status"] == "unresolved"]
          release_blocked = is_protected_release_path and len(blocking_conditions) > 0

          # schema_version 1.1 adds protected-release decision keys:
          # is_protected_release_path, release_blocked, blocking_condition_count,
          # and release_blocking_conditions.
          payload = {
              "schema_version": "1.1",
              "source": "android-ci",
              "state_vocabulary": ["not_run", "partially_run", "failed", "evidenced"],
              "protected_execution_state": protected_execution_state,
              "real_device_e2e_state": real_device_e2e_state,
              "key_behavior_evidence_status": {
                  "replay_ordering": replay_ordering_state,
                  "reconnect_continuity": reconnect_continuity_state,
                  "recovery_behavior": recovery_behavior_state,
                  "closure_completeness": closure_completeness_state
              },
              "gate_results": {
                  "build": build,
                  "protocol_contract_guard": protocol,
                  "runtime_regression": runtime,
                  "cross_repo_compatibility_guard": compat,
                  "e2e_verification_gate": e2e,
                  "all_unit_tests": unit,
                  "lint": lint
              },
              "release_path_class": release_path_class,
              "is_protected_release_path": is_protected_release_path,
              "release_blocked": release_blocked,
              "blocking_condition_count": len(blocking_conditions),
              "release_blocking_conditions": conditions,
              "evidence_visibility_reason": evidence_visibility_reason,
              "no_device_default_artifact_tag": "e2e_blocked_no_device"
          }

          out_path = "app/build/e2e-verification/cross-repo-evidence-status.json"
          with open(out_path, "w", encoding="utf-8") as f:
              json.dump(payload, f, indent=2, ensure_ascii=False)
          print(f"Wrote structured cross-repo evidence artifact to {out_path}")
          PY

      - name: Validate structured cross-repo evidence artifact shape
        run: |
          python3 - <<'PY'
          import json
          path = "app/build/e2e-verification/cross-repo-evidence-status.json"
          with open(path, "r", encoding="utf-8") as f:
              data = json.load(f)
          required_top = [
              "schema_version",
              "is_protected_release_path",
              "release_blocked",
              "blocking_condition_count",
              "release_blocking_conditions",
              "key_behavior_evidence_status",
              "gate_results",
          ]
          missing = [k for k in required_top if k not in data]
          if missing:
              raise SystemExit(f"Missing required top-level keys: {missing}")
          if not isinstance(data["release_blocking_conditions"], list):
              raise SystemExit("release_blocking_conditions must be a list")
          print("Structured cross-repo evidence artifact shape is valid.")
          PY

      - name: Generate canonical evidence_json bundle
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          from datetime import datetime, timezone

          status_path = Path("app/build/e2e-verification/cross-repo-evidence-status.json")
          out_path = Path("app/build/e2e-verification/evidence_json.json")
          status = json.loads(status_path.read_text(encoding="utf-8"))

          state_vocabulary = status.get("state_vocabulary", [])
          gate_results = status.get("gate_results", {})
          behavior = status.get("key_behavior_evidence_status", {})

          def gate_to_signal_state(gate_name: str) -> str:
              result = gate_results.get(gate_name, "unknown")
              if result == "success":
                  return "evidenced"
              if result in {"failure", "cancelled"}:
                  return "failed"
              if result == "skipped":
                  return "not_run"
              return "not_run"

          canonical_bundle = {
              "schema_version": "1.0",
              "evidence_kind": "android_canonical_dual_repo_evidence",
              "source": "android-ci",
              "generated_at_utc": datetime.now(timezone.utc).isoformat(),
              "is_protected_release_path": bool(status.get("is_protected_release_path", False)),
              "release_path_class": status.get("release_path_class", "development_or_pr"),
              "protected_execution_state": status.get("protected_execution_state", "not_run"),
              "session_epoch_recovery_identity": {
                  "durable_session_id_key": "durable_session_id",
                  "session_continuity_epoch_key": "session_continuity_epoch",
                  "recovery_phase_key": "continuity_recovery_state",
                  "recovery_phase_source_key": "continuity_recovery_source",
                  "recovery_phase_schema_key": "continuity_recovery_schema_version",
                  "recovery_routing_category_key": "recovery_state_v2_routing_category",
                  "recovery_routing_schema_key": "recovery_state_routing_schema_version",
                  "authority_scope": "android_local_evidence_non_authoritative"
              },
              "android_signals": {
                  "runtime": {
                      "signal_id": "runtime_regression",
                      "state": gate_to_signal_state("runtime_regression"),
                      "source_gate": "runtime_regression",
                  },
                  "lifecycle": {
                      "signal_id": "protocol_contract_guard",
                      "state": gate_to_signal_state("protocol_contract_guard"),
                      "source_gate": "protocol_contract_guard",
                  },
                  "closure": {
                      "signal_id": "closure_completeness",
                      "state": behavior.get("closure_completeness", "not_run"),
                      "source_gate": "e2e_verification_gate",
                  },
                  "replay": {
                      "signal_id": "replay_ordering",
                      "state": behavior.get("replay_ordering", "not_run"),
                      "source_gate": "e2e_verification_gate",
                      "identity": {
                          "dedupe_contract_schema_version": "android_v2_canonical_dedupe_v1",
                          "lineage_schema_version_key": "uplink_lineage_schema_version",
                          "lineage_dedupe_key": "uplink_lineage_dedupe_key",
                          "durable_session_id_key": "durable_session_id",
                          "session_continuity_epoch_key": "session_continuity_epoch",
                      },
                      "authority_scope": "android_replay_evidence_non_authoritative",
                  },
                  "recovery": {
                      "signal_id": "recovery_behavior",
                      "state": behavior.get("recovery_behavior", "not_run"),
                      "source_gate": "e2e_verification_gate",
                      "identity": {
                          "recovery_phase_key": "continuity_recovery_state",
                          "recovery_phase_source_key": "continuity_recovery_source",
                          "recovery_phase_schema_key": "continuity_recovery_schema_version",
                          "routing_category_key": "recovery_state_v2_routing_category",
                          "routing_schema_key": "recovery_state_routing_schema_version",
                      },
                      "authority_scope": "android_recovery_evidence_non_authoritative",
                  },
                  "reconnect_continuity": {
                      "signal_id": "reconnect_continuity",
                      "state": behavior.get("reconnect_continuity", "not_run"),
                      "source_gate": "e2e_verification_gate",
                      "identity": {
                          "durable_session_id_key": "durable_session_id",
                          "session_continuity_epoch_key": "session_continuity_epoch",
                          "runtime_truth_signal_kind": "runtime_truth_snapshot",
                      },
                      "authority_scope": "android_reconnect_evidence_non_authoritative",
                  },
                  "evaluator": {
                      "signal_id": "android_cross_repo_ci_evaluator",
                      "state": "failed" if bool(status.get("release_blocked", False)) else "evidenced",
                      "release_blocked": bool(status.get("release_blocked", False)),
                      "blocking_condition_count": int(status.get("blocking_condition_count", 0)),
                      "source_gate": "cross_repo_evidence_status",
                  },
              },
              "gate_results": gate_results,
              "release_blocking_conditions": status.get("release_blocking_conditions", []),
              "state_vocabulary": state_vocabulary,
          }

          out_path.write_text(json.dumps(canonical_bundle, indent=2, ensure_ascii=False), encoding="utf-8")
          print(f"Wrote canonical evidence bundle: {out_path}")
          PY

      - name: Validate canonical evidence_json bundle structure
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("app/build/e2e-verification/evidence_json.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          required_top = [
              "schema_version",
              "evidence_kind",
              "source",
              "is_protected_release_path",
              "session_epoch_recovery_identity",
              "android_signals",
              "gate_results",
              "release_blocking_conditions",
          ]
          missing_top = [k for k in required_top if k not in data]
          if missing_top:
              raise SystemExit(f"Missing top-level keys in canonical evidence_json: {missing_top}")

          required_signals = ["runtime", "lifecycle", "closure", "replay", "recovery", "reconnect_continuity", "evaluator"]
          signals = data.get("android_signals", {})
          missing_signals = [k for k in required_signals if k not in signals]
          if missing_signals:
              raise SystemExit(f"Missing required android_signals entries: {missing_signals}")

          state_vocab = set(data.get("state_vocabulary", []))
          for signal_key in required_signals:
              signal = signals.get(signal_key, {})
              if not isinstance(signal, dict):
                  raise SystemExit(f"Signal {signal_key} must be an object")
              for required in ("signal_id", "state", "source_gate"):
                  if required not in signal:
                      raise SystemExit(f"Signal {signal_key} is missing required key: {required}")
              for required_non_blank in ("signal_id", "source_gate"):
                  value = signal.get(required_non_blank)
                  if not isinstance(value, str) or not value.strip():
                      raise SystemExit(f"Signal {signal_key} key {required_non_blank} must be a non-empty string")
              if not isinstance(signal["state"], str) or signal["state"] not in state_vocab:
                  raise SystemExit(
                      f"Signal {signal_key} state '{signal['state']}' is outside allowed vocabulary: {sorted(state_vocab)}"
                  )

          identity_surface = data.get("session_epoch_recovery_identity", {})
          if not isinstance(identity_surface, dict):
              raise SystemExit("session_epoch_recovery_identity must be an object")
          identity_surface_keys = [
              "durable_session_id_key",
              "session_continuity_epoch_key",
              "recovery_phase_key",
              "recovery_phase_source_key",
              "recovery_phase_schema_key",
              "recovery_routing_category_key",
              "recovery_routing_schema_key",
              "authority_scope",
          ]
          missing_identity_surface = [k for k in identity_surface_keys if k not in identity_surface]
          if missing_identity_surface:
              raise SystemExit(f"session_epoch_recovery_identity missing required keys: {missing_identity_surface}")

          for signal_key in ("replay", "recovery", "reconnect_continuity"):
              signal = signals.get(signal_key, {})
              if "identity" not in signal or not isinstance(signal["identity"], dict):
                  raise SystemExit(f"Signal {signal_key} must include identity object")
              if "authority_scope" not in signal:
                  raise SystemExit(f"Signal {signal_key} must include authority_scope")
          print("Canonical evidence_json structure is valid.")
          PY

      - name: Read protected path flag from evidence_json
        id: evidence_flags
        run: |
          python3 - <<'PY'
          import json
          import os

          with open("app/build/e2e-verification/evidence_json.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          is_protected = bool(data.get("is_protected_release_path", False))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"is_protected_release_path={'true' if is_protected else 'false'}\n")
          print(f"is_protected_release_path={is_protected}")
          PY

      - name: Dispatch canonical evidence_json bundle to V2
        if: steps.evidence_flags.outputs.is_protected_release_path == 'true'
        env:
          V2_DISPATCH_TOKEN: ${{ secrets.V2_REPO_DISPATCH_TOKEN }}
          GITHUB_REPOSITORY_VALUE: ${{ github.repository }}
          GITHUB_REF_VALUE: ${{ github.ref }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
          GITHUB_RUN_ID_VALUE: ${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          from urllib.request import Request, urlopen
          from urllib.error import HTTPError, URLError

          token = os.getenv("V2_DISPATCH_TOKEN", "")
          if not token:
              raise SystemExit(
                  "Protected release path requires secrets.V2_REPO_DISPATCH_TOKEN for cross-repo repository_dispatch."
              )

          evidence = json.loads(Path("app/build/e2e-verification/evidence_json.json").read_text(encoding="utf-8"))
          target_repository = "DannyFish-11/ufo-galaxy-realization-v2"

          payload = {
              "event_type": "android_canonical_evidence_bundle",
              "client_payload": {
                  "source_repository": os.getenv("GITHUB_REPOSITORY_VALUE", ""),
                  "source_ref": os.getenv("GITHUB_REF_VALUE", ""),
                  "source_sha": os.getenv("GITHUB_SHA_VALUE", ""),
                  "source_run_id": os.getenv("GITHUB_RUN_ID_VALUE", ""),
                  "evidence_json": evidence,
              },
          }

          request_path = Path("app/build/e2e-verification/repository-dispatch-request.json")
          request_path.write_text(json.dumps(payload, indent=2, ensure_ascii=False), encoding="utf-8")

          req = Request(
              f"https://api.github.com/repos/{target_repository}/dispatches",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
                  "User-Agent": "ufo-galaxy-android-ci",
              },
              method="POST",
          )

          try:
              with urlopen(req) as response:
                  status = int(response.status)
                  response_body = response.read().decode("utf-8")
                  response_headers = dict(response.headers.items())
          except HTTPError as exc:
              response_body = exc.read().decode("utf-8", errors="replace")
              raise SystemExit(
                  f"repository_dispatch failed with HTTP {exc.code}: {response_body}"
              ) from exc
          except URLError as exc:
              raise SystemExit(f"repository_dispatch failed with network error: {exc}") from exc

          if status != 204:
              raise SystemExit(
                  f"repository_dispatch failed with unexpected status {status}; "
                  f"headers={response_headers}; body={response_body}"
              )

          response_path = Path("app/build/e2e-verification/repository-dispatch-response.json")
          response_path.write_text(
              json.dumps(
                  {
                      "status": status,
                      "accepted": True,
                      "target_repository": target_repository,
                      "event_type": payload["event_type"],
                  },
                  indent=2,
                  ensure_ascii=False,
              ),
              encoding="utf-8",
          )
          print(f"repository_dispatch succeeded with status {status}.")
          PY

      - name: Upload cross-repo evidence status artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-repo-evidence-status
          path: |
            app/build/e2e-verification/cross-repo-evidence-status.json
            app/build/e2e-verification/evidence_json.json
            app/build/e2e-verification/repository-dispatch-request.json
            app/build/e2e-verification/repository-dispatch-response.json

  # ── CI Gate (final blocking gate — all must be green) ────────────────────
  #
  # This job is the single merge-blocking status check.  Configure branch
  # protection to require "CI Gate" to pass before merging.  Because all
  # upstream jobs are listed in `needs`, GitHub marks this job as failed if
  # any upstream job fails, which blocks the PR.
  protected-release-enforcement-gate:
    name: "Protected Release Enforcement Gate"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [cross-repo-evidence-status]
    if: always()

    steps:
      - name: Download cross-repo evidence status artifact
        uses: actions/download-artifact@v4
        with:
          name: cross-repo-evidence-status
          path: app/build/e2e-verification

      - name: Enforce structured blocking conditions on protected release paths
        run: |
          python3 - <<'PY'
          import json
          path = "app/build/e2e-verification/cross-repo-evidence-status.json"
          with open(path, "r", encoding="utf-8") as f:
              data = json.load(f)
          is_protected = bool(data.get("is_protected_release_path", False))
          is_blocked = bool(data.get("release_blocked", False))
          conditions = data.get("release_blocking_conditions", [])
          unresolved = [c for c in conditions if c.get("status") == "unresolved"]
          print(f"Protected path: {is_protected}")
          print(f"Release blocked : {is_blocked}")
          print(f"Unresolved conditions: {len(unresolved)}")
          if unresolved:
              print("Blocking condition details:")
              for c in unresolved:
                  print(
                      f"- [{c.get('condition_class')}] {c.get('condition_id')} "
                      f"(invariant={c.get('invariant')}, gate={c.get('source_gate')}, "
                      f"actual={c.get('actual_value')}, expected={c.get('expected_value')}, "
                      f"reason={c.get('failure_reason')})"
                  )
                  print(f"  action: {c.get('action_hint')}")
          if is_protected and is_blocked:
              raise SystemExit(
                  "Protected release path is blocked by unresolved cross-repo continuity/replay/schema/evidence/closure conditions."
              )
          if not is_protected and unresolved:
              print("Non-protected path: unresolved conditions are surfaced as structured evidence only.")
          PY

  ci-gate:
    name: "CI Gate (all blocking gates must pass)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [all-unit-tests, lint, cross-repo-compatibility-guard, cross-repo-evidence-status, protected-release-enforcement-gate]
    if: always()

    steps:
      - name: Check all gate results
        run: |
          echo "Gate results:"
          echo "  all-unit-tests        : ${{ needs.all-unit-tests.result }}"
          echo "  cross-repo-compat     : ${{ needs.cross-repo-compatibility-guard.result }}"
          echo "  cross-repo-evidence   : ${{ needs.cross-repo-evidence-status.result }}"
          echo "  protected-release     : ${{ needs.protected-release-enforcement-gate.result }}"
          echo "  lint                  : ${{ needs.lint.result }}"
          if [[ "${{ needs.all-unit-tests.result }}" != "success" || \
                "${{ needs.cross-repo-compatibility-guard.result }}" != "success" || \
                "${{ needs.cross-repo-evidence-status.result }}" != "success" || \
                "${{ needs.protected-release-enforcement-gate.result }}" != "success" || \
                "${{ needs.lint.result }}" != "success" ]]; then
            echo "::error::One or more CI blocking gates failed. PR merge is blocked."
            exit 1
          fi
          echo "All CI blocking gates passed."
