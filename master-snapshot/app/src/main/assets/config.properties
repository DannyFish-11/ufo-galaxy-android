## UFO³ Galaxy Android Agent 配置

# Galaxy Gateway WebSocket 地址
# 请修改为您的 Windows PC 的 Tailscale IP 地址
# 格式：ws://<host>:<port>  或  wss://<host>:<port>（仅主机+端口，不含路径）
# WebSocket 路径由客户端自动选择，按优先级回退：
#   1. /ws/android/{id}  （首选 – AndroidBridge 主路径，realization-v2 标准路由）
#   2. /ws/device/{id}   （含设备 ID 的通用回退路径）
#   3. /ws/android       （通用 Android 路径）
#   4. /ws/ufo3/{id}     （传统 UFO³ 路径，兼容旧版服务器）
# 注意：WS、REST 与 WebRTC 均运行于同一进程、同一端口（8765），无端口冲突。
galaxy.gateway.url=ws://100.x.x.x:8765

# Agent ID (如果为空，将自动生成)
agent.id=

# Agent 名称
agent.name=Android Agent

# Agent 能力标签 (逗号分隔)
agent.capabilities=mobile,ui_automation,voice_input,text_input

# 心跳间隔 (毫秒)
heartbeat.interval=30000

# 自动重连
auto.reconnect=true

# REST API 基础地址（HTTP）
# 设备注册/心跳/发现接口优先使用 /api/v1/devices/*，
# 如果服务器返回 404 则自动回退到旧版 /api/devices/*
# 与 WebSocket 使用同一端口（8765），由 Galaxy Gateway 同一进程提供服务。
rest.base.url=http://100.x.x.x:8765
