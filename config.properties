# UFO Galaxy Android Configuration
#
# cross_device_enabled: opt-in switch for cross-device collaboration.
#
# false (default): the device operates in local-only mode.
#   - No WebSocket connection is established.
#   - No device_register or capability_report messages are sent.
#   - All task execution runs locally via LocalGoalExecutor / EdgeExecutor.
#
# true: cross-device collaboration is active.
#   - The device connects to the Galaxy gateway.
#   - Sends device_register and capability_report on connect.
#   - Accepts goal_execution, parallel_subtask, and task_assign messages.
#   - Sends results back to the gateway.
#
# This value is the build-time default; the runtime value can be toggled via
# UFOGalaxyApplication.setCrossDeviceEnabled(Boolean) or the developer settings menu.
cross_device_enabled=false
